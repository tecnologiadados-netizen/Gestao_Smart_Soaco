# Reverse proxy para gsmartsoaco.com.br → Node (Gestor Pedidos) em 127.0.0.1:4000
#
# Pré-requisitos no servidor Windows (10.80.1.187):
# 1) Build: na raiz do repo → npm run build --prefix backend && npm run build:frontend --prefix backend
# 2) Subir API: NODE_ENV=production npm start --prefix backend (lê APP_PORT do backend/.env)
# 3) No .env do backend: APP_PORT=4000, e com HTTPS na frente deste nginx: TRUST_PROXY=true e COOKIE_SECURE=true
#
# DNS Hostinger: registros A para @ e www → 170.84.146.147
# Roteador (MikroTik): NAT WAN TCP 80 e 443 → 10.80.1.187:80 e :443.
# Se a internet não alcançar :80 no IP público, Let's Encrypt e visitantes em http://domínio falham (Connection refused).
#
# Coloque este arquivo em conf.d do nginx ou inclua com include. Ajuste caminhos dos certificados SSL.

upstream gestor_node {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name gsmartsoaco.com.br www.gsmartsoaco.com.br;

    # Redirecionar HTTP → HTTPS (descomente após ter certificados)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://gestor_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 5m;
    }
}

